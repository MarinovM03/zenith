@if (status() === 'loading' || status() === 'idle') {
  <main class="boot">
    <p>Loading…</p>
  </main>
} @else {
  <header class="shell__header">
    <a routerLink="/" class="shell__brand">Acca</a>
    <nav class="shell__nav">
      @if (isAuthenticated()) {
        <span class="shell__user">{{ user()?.email }}</span>
        <button type="button" class="shell__action" (click)="logout()">Log out</button>
      } @else {
        <a routerLink="/login" class="shell__action">Log in</a>
        <a routerLink="/register" class="shell__action shell__action--primary">Sign up</a>
      }
    </nav>
  </header>

  <router-outlet />
}
