<app-cosmic-background />

@if (status() === 'loading' || status() === 'idle') {
  <main class="boot">
    <span class="boot__spinner" aria-label="Loading"></span>
  </main>
} @else {
  <header class="shell">
    <div class="shell__inner">
      <a routerLink="/" class="brand">
        <span class="brand__mark" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none">
            <path d="M12 2 L15 9 L22 12 L15 15 L12 22 L9 15 L2 12 L9 9 Z" fill="currentColor" />
          </svg>
        </span>
        <span class="brand__name">Zenith</span>
      </a>

      <nav class="nav">
        <a class="nav__link" routerLink="/apod" routerLinkActive="nav__link--active"
          >Picture of the Day</a
        >
        <a class="nav__link" routerLink="/launches" routerLinkActive="nav__link--active"
          >Launches</a
        >
        <a class="nav__link" routerLink="/mars" routerLinkActive="nav__link--active">Mars</a>
        <a class="nav__link" routerLink="/asteroids" routerLinkActive="nav__link--active"
          >Asteroids</a
        >
        <a class="nav__link" routerLink="/iss" routerLinkActive="nav__link--active">ISS</a>
      </nav>

      <div class="shell__user">
        @if (isAuthenticated()) {
          <a
            class="nav__link nav__link--fav"
            routerLink="/favourites"
            routerLinkActive="nav__link--active"
          >
            <span class="nav__star" aria-hidden="true">★</span> Favourites
          </a>
          <span class="shell__email">{{ user()?.email }}</span>
          <button type="button" class="shell__btn" (click)="logout()">Log out</button>
        } @else {
          <a routerLink="/login" class="shell__btn">Log in</a>
          <a routerLink="/register" class="shell__btn shell__btn--accent">Sign up</a>
        }
      </div>
    </div>
  </header>

  <router-outlet />
}
