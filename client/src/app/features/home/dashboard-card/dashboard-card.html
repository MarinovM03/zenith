<div class="dash-wrap">
  <a
    class="dash"
    [class.dash--launch]="variant() === 'launch'"
    [class.dash--asteroids]="variant() === 'asteroids'"
    [class.dash--mars]="variant() === 'mars'"
    [class.dash--iss]="variant() === 'iss'"
    [class.dash--error]="error()"
    [routerLink]="route()"
  >
    @if (backgroundImage(); as image) {
      <span class="dash__bg">
        <img appImgFade [src]="image" [alt]="backgroundAlt()" loading="lazy" decoding="async" />
      </span>
      <span class="dash__bg-scrim" aria-hidden="true"></span>
    } @else {
      <span class="dash__glow" aria-hidden="true"></span>
    }

    <span class="dash__head">
      <span class="dash__icon" aria-hidden="true">
        @switch (variant()) {
          @case ('launch') {
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"
              />
              <path
                d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"
              />
              <path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0" />
              <path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5" />
            </svg>
          }
          @case ('asteroids') {
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="3" />
              <circle cx="19" cy="5" r="2" />
              <circle cx="5" cy="19" r="2" />
              <path d="M10.4 21.9a10 10 0 0 0 9.941-15.416" />
              <path d="M13.5 2.1a10 10 0 0 0-9.841 15.416" />
            </svg>
          }
          @case ('mars') {
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <circle cx="12" cy="12" r="10" />
              <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20" />
              <path d="M2 12h20" />
            </svg>
          }
          @case ('iss') {
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M13 7 9 3 5 7l4 4" />
              <path d="m17 11 4 4-4 4-4-4" />
              <path d="m8 12 4 4 6-6-4-4Z" />
              <path d="m16 8 3-3" />
              <path d="M9 21a6 6 0 0 0-6-6" />
            </svg>
          }
        }
      </span>
      <span class="dash__section">{{ title() }}</span>
      <span class="dash__arrow" aria-hidden="true">→</span>
    </span>

    <ng-content />
  </a>

  @if (error()) {
    <button type="button" class="dash__retry" (click)="retry.emit()">Try again</button>
  }
</div>
