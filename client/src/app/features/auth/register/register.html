<main class="auth">
  <section class="auth__card">
    <header class="auth__header">
      <h1>Create your account</h1>
      <p>Start tracking your accumulators.</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth__form" novalidate>
      <label class="field">
        <span class="field__label">Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          required
          class="field__input"
        />
      </label>

      <label class="field">
        <span class="field__label">Password (at least 8 characters)</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="new-password"
          required
          minlength="8"
          class="field__input"
        />
      </label>

      @if (error(); as message) {
        <p class="auth__error" role="alert">{{ message }}</p>
      }

      <button type="submit" class="auth__submit" [disabled]="form.invalid || submitting()">
        {{ submitting() ? 'Creating account…' : 'Create account' }}
      </button>
    </form>

    <p class="auth__footer">Already have an account? <a routerLink="/login">Log in</a>.</p>
  </section>
</main>
