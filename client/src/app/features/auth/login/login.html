<main class="auth">
  <section class="auth__card">
    <header class="auth__header">
      <h1>Log in</h1>
      <p>Welcome back.</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth__form" novalidate>
      <label class="field">
        <span class="field__label">Email</span>
        <input
          type="email"
          formControlName="email"
          autocomplete="email"
          required
          class="field__input"
        />
      </label>

      <label class="field">
        <span class="field__label">Password</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          required
          class="field__input"
        />
      </label>

      @if (error(); as message) {
        <p class="auth__error" role="alert">{{ message }}</p>
      }

      <button type="submit" class="auth__submit" [disabled]="form.invalid || submitting()">
        {{ submitting() ? 'Logging in…' : 'Log in' }}
      </button>
    </form>

    <p class="auth__footer">No account? <a routerLink="/register">Create one</a>.</p>
  </section>
</main>
