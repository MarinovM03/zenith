<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Zenith — Space Explorer</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <meta
      name="description"
      content="Explore space with Zenith — NASA's daily picture, live rocket launches, Mars rover photos, near-Earth asteroids, and a live ISS tracker."
    />
    <meta name="theme-color" content="#0a0716" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Zenith" />
    <meta property="og:title" content="Zenith — Space Explorer" />
    <meta
      property="og:description"
      content="NASA's daily picture, live rocket launches, Mars rover photos, near-Earth asteroids, and a live ISS tracker."
    />
    <meta property="og:image" content="og-image.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Zenith — Space Explorer" />
    <meta
      name="twitter:description"
      content="NASA's daily picture, live rocket launches, Mars rover photos, near-Earth asteroids, and a live ISS tracker."
    />
    <meta name="twitter:image" content="og-image.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      />
    </noscript>
    <style>
      .app-loading {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background-color: #050310;
      }
      .app-loading__spinner {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        border: 3px solid rgba(166, 76, 232, 0.25);
        border-top-color: #a64ce8;
        animation: app-loading-spin 0.7s linear infinite;
      }
      @keyframes app-loading-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .app-loading__spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <app-root>
      <div class="app-loading">
        <div class="app-loading__spinner"></div>
      </div>
    </app-root>
  </body>
</html>
