services:
  postgres:
    image: postgres:16-alpine
    container_name: zenith-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zenith}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zenith_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-zenith}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - zenith-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zenith} -d ${POSTGRES_DB:-zenith}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zenith-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - zenith-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  zenith-postgres-data:
  zenith-redis-data:
